<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Trainer — A-Level · TGAT · TOEFL ITP</title>
<style>
  :root {
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#efefeb;
    --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
    --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.18);
    --green:#2d7a4f;--green-bg:#edf7f1;
    --red:#b83232;--red-bg:#fdf0f0;
    --blue:#1d5fa8;--blue-bg:#eef4fc;
    --r:12px;--rs:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#161616;--bg2:#1f1f1f;--bg3:#2a2a2a;--text:#f0f0f0;--text2:#a0a0a0;--text3:#555;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.2);--green:#4caf7d;--green-bg:#0d2b1a;--red:#e06060;--red-bg:#2b0d0d;--blue:#6aaef5;--blue-bg:#0d1e33;}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrap{max-width:680px;margin:0 auto;padding:2rem 1.25rem 5rem;}
  .logo{font-size:20px;font-weight:600;letter-spacing:-0.4px;}
  .logo span{color:var(--text2);font-weight:400;}
  .sub{font-size:12px;color:var(--text3);margin-top:3px;margin-bottom:2rem;}

  /* Tabs */
  .tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:1.25rem;}
  .tab{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;}
  .tab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}

  /* Level */
  .lvls{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .lb{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);transition:all .15s;font-weight:500;}
  .lb.on{background:var(--text);color:var(--bg);border-color:var(--text);}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
  .st{background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center;}
  .st-n{font-size:22px;font-weight:600;}
  .st-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.3px;text-transform:uppercase;}

  /* Progress */
  .pg{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:1.25rem;overflow:hidden;}
  .pgb{height:3px;background:var(--text);border-radius:2px;transition:width .4s;}

  /* Card */
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:2.5rem 1.75rem;text-align:center;cursor:pointer;user-select:none;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .15s;}
  .card:hover{border-color:var(--border2);}
  .cw{font-size:36px;font-weight:600;letter-spacing:-1px;}
  .cph{font-size:13px;color:var(--text2);margin-top:5px;font-style:italic;}
  .ctags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
  .tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--text3);border:1px solid var(--border);}
  .etag{background:var(--blue-bg);color:var(--blue);border-color:transparent;}
  .ltag-a1{background:#e8f5e9;color:#2e7d32;border:none;}
  .ltag-a2{background:#e3f2fd;color:#1565c0;border:none;}
  .ltag-b1{background:#fff8e1;color:#f57f17;border:none;}
  .ltag-b2{background:#fce4ec;color:#c62828;border:none;}
  .ltag-c1{background:#f3e5f5;color:#6a1b9a;border:none;}
  @media(prefers-color-scheme:dark){
    .ltag-a1{background:#1b3a1f;color:#81c784;}.ltag-a2{background:#0d2137;color:#64b5f6;}.ltag-b1{background:#332a00;color:#ffcc02;}.ltag-b2{background:#3b0d14;color:#ef9a9a;}.ltag-c1{background:#2a0d38;color:#ce93d8;}
  }
  .cm{font-size:17px;font-weight:500;margin-top:16px;display:none;}
  .cpos{font-size:11px;color:var(--text3);margin-top:3px;display:none;}
  .cex{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;font-style:italic;display:none;}
  .chint{font-size:11px;color:var(--text3);margin-top:16px;}
  .cbtns{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-top:.85rem;}
  .cb{padding:10px 14px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;font-size:13px;cursor:pointer;color:var(--text);transition:all .12s;}
  .cb:hover{background:var(--bg2);}
  .cb-no{border-color:var(--red);color:var(--red);}
  .cb-no:hover{background:var(--red-bg);}
  .cb-yes{border-color:var(--green);color:var(--green);}
  .cb-yes:hover{background:var(--green-bg);}
  .cb-sk{color:var(--text2);}

  /* Quiz */
  .qw{font-size:32px;font-weight:600;text-align:center;letter-spacing:-.8px;margin-bottom:4px;}
  .qph{font-size:13px;color:var(--text2);text-align:center;font-style:italic;margin-bottom:4px;}
  .qtags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem;}
  .opt{padding:15px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text);text-align:left;line-height:1.4;transition:all .12s;}
  .opt:hover:not(:disabled){border-color:var(--border2);background:var(--bg2);}
  .opt.ok{background:var(--green-bg);border-color:var(--green);color:var(--green);}
  .opt.ng{background:var(--red-bg);border-color:var(--red);color:var(--red);}
  .opt:disabled{cursor:default;}
  .nxrow{display:none;margin-top:.25rem;}
  .btnp{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;}
  .btnp:hover{opacity:.8;}
  .btno{width:100%;padding:11px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;}
  .btno:hover{background:var(--bg2);}

  /* Result */
  .res{display:none;text-align:center;padding:3rem 1rem;}
  .rs{font-size:52px;font-weight:700;letter-spacing:-2px;}
  .rl{font-size:14px;color:var(--text2);margin-top:4px;margin-bottom:2rem;}
  .rbtns{display:flex;gap:8px;max-width:300px;margin:0 auto;}

  /* Match */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem;}
  .mcol{display:flex;flex-direction:column;gap:7px;}
  .mb{padding:11px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text);text-align:left;line-height:1.4;transition:all .12s;min-height:46px;}
  .mb:hover{border-color:var(--border2);}
  .mb.sel{border-color:var(--text);background:var(--bg2);}
  .mb.matched{background:var(--green-bg);border-color:var(--green);color:var(--green);cursor:default;}
  .mb.err{background:var(--red-bg);border-color:var(--red);}
  .mmsg{text-align:center;font-size:13px;color:var(--text2);margin-bottom:.75rem;min-height:20px;}

  .hidden{display:none!important;}
  @media(max-width:480px){
    .opts{grid-template-columns:1fr;}
    .cw{font-size:28px;}.qw{font-size:25px;}.rs{font-size:42px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">vocab trainer <span>/ สอบเข้ามหาวิทยาลัย</span></div>
  <div class="sub">A-Level · TGAT · TOEFL ITP &nbsp;|&nbsp; CEFR A1 – C1 &nbsp;|&nbsp; <span id="word-count">0</span> คำ</div>

  <div class="tabs">
    <button class="tab on" onclick="switchMode('flash')">🃏 Flashcard</button>
    <button class="tab" onclick="switchMode('quiz')">🧠 Quiz</button>
    <button class="tab" onclick="switchMode('match')">🔗 จับคู่</button>
  </div>

  <div class="lvls">
    <button class="lb on" onclick="setLevel('all')">ทั้งหมด</button>
    <button class="lb" onclick="setLevel('A1')">A1</button>
    <button class="lb" onclick="setLevel('A2')">A2</button>
    <button class="lb" onclick="setLevel('B1')">B1</button>
    <button class="lb" onclick="setLevel('B2')">B2</button>
    <button class="lb" onclick="setLevel('C1')">C1</button>
  </div>

  <div class="stats">
    <div class="st"><div class="st-n" id="s-total">0</div><div class="st-l">คำทั้งหมด</div></div>
    <div class="st"><div class="st-n" id="s-known">0</div><div class="st-l">รู้แล้ว ✓</div></div>
    <div class="st"><div class="st-n" id="s-streak">0</div><div class="st-l">streak 🔥</div></div>
  </div>

  <!-- FLASH -->
  <div id="m-flash">
    <div class="pg"><div class="pgb" id="fp" style="width:0%"></div></div>
    <div class="card" id="fc" onclick="flip()">
      <div class="cw" id="fw">—</div>
      <div class="cph" id="fph"></div>
      <div class="ctags" id="ftags"></div>
      <div class="cm" id="fm"></div>
      <div class="cpos" id="fpos"></div>
      <div class="cex" id="fex"></div>
      <div class="chint" id="fhint">แตะเพื่อดูความหมาย</div>
    </div>
    <div class="cbtns">
      <button class="cb cb-no" onclick="mark(false)">✕ ยังไม่รู้</button>
      <button class="cb cb-sk" onclick="nextCard()">→</button>
      <button class="cb cb-yes" onclick="mark(true)">✓ รู้แล้ว</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="m-quiz" class="hidden">
    <div class="pg"><div class="pgb" id="qp" style="width:0%"></div></div>
    <div id="qbody">
      <div class="qw" id="qw">—</div>
      <div class="qph" id="qph"></div>
      <div class="qtags" id="qtags"></div>
      <div class="opts" id="qopts"></div>
      <div class="nxrow" id="qnx"><button class="btnp" onclick="nextQuiz()">ถัดไป →</button></div>
    </div>
    <div class="res" id="qres">
      <div class="rs" id="rscore">0/0</div>
      <div class="rl" id="rsub"></div>
      <div class="rbtns">
        <button class="btnp" onclick="startQuiz()">เล่นใหม่</button>
        <button class="btno" onclick="switchMode('flash')">Flashcard</button>
      </div>
    </div>
  </div>

  <!-- MATCH -->
  <div id="m-match" class="hidden">
    <div class="mgrid">
      <div class="mcol" id="mw"></div>
      <div class="mcol" id="md"></div>
    </div>
    <div class="mmsg" id="mmsg"></div>
    <button class="btno" onclick="startMatch()">🔀 ชุดใหม่</button>
  </div>
</div>

{w:"expedite",ph:"/ˈek.spɪ.daɪt/",pos:"v.",th:"เร่งรัด, ทำให้เร็วขึ้น",ex:"We need to expedite the process.",l:"C1",e:["TOEFL"]},
{w:"frivolous",ph:"/ˈfrɪv.ə.ləs/",pos:"adj.",th:"ไร้สาระ, ไม่จริงจัง",ex:"Don't waste time on frivolous matters.",l:"C1",e:["TOEFL"]},
{w:"gregarious",ph:"/ɡrɪˈɡeər.i.əs/",pos:"adj.",th:"ชอบสังคม, เข้าสังคมง่าย",ex:"She is very gregarious by nature.",l:"C1",e:["TOEFL"]},
{w:"incongruous",ph:"/ɪnˈkɒŋ.ɡru.əs/",pos:"adj.",th:"ไม่เข้ากัน, ดูผิดที่",ex:"His formal suit looked incongruous.",l:"C1",e:["TOEFL"]},
{w:"indiscriminate",ph:"/ˌɪn.dɪˈskrɪm.ɪ.nət/",pos:"adj.",th:"ไม่เลือกหน้า, สุ่มสี่สุ่มห้า",ex:"Indiscriminate use of antibiotics is dangerous.",l:"C1",e:["TOEFL"]},
{w:"jeopardize",ph:"/ˈdʒep.ə.daɪz/",pos:"v.",th:"ทำให้เสี่ยงอันตราย",ex:"This could jeopardize the mission.",l:"C1",e:["TOEFL","TGAT"]},
{w:"meticulous",ph:"/məˈtɪk.jʊ.ləs/",pos:"adj.",th:"ละเอียดถี่ถ้วน",ex:"She is meticulous in her research.",l:"C1",e:["TOEFL"]},
{w:"mitigate",ph:"/ˈmɪt.ɪ.ɡeɪt/",pos:"v.",th:"บรรเทา, ลดความรุนแรง",ex:"Steps were taken to mitigate risk.",l:"C1",e:["TOEFL","A-Level"]},
{w:"ostensibly",ph:"/ɒˈsten.sɪ.bli/",pos:"adv.",th:"ที่แสดงออกมา, ดูเหมือนว่า",ex:"He was ostensibly calm.",l:"C1",e:["TOEFL"]},
{w:"perfunctory",ph:"/pəˈfʌŋk.tər.i/",pos:"adj.",th:"ทำไปงั้น, ขาดความตั้งใจ",ex:"He gave a perfunctory nod.",l:"C1",e:["TOEFL"]},
{w:"pragmatic",ph:"/præɡˈmæt.ɪk/",pos:"adj.",th:"ปฏิบัตินิยม",ex:"We need a pragmatic solution.",l:"C1",e:["TOEFL","TGAT"]},
{w:"proliferate",ph:"/prəˈlɪf.ər.eɪt/",pos:"v.",th:"เพิ่มขึ้นอย่างรวดเร็ว",ex:"Social media platforms have proliferated.",l:"C1",e:["TOEFL"]},
{w:"quandary",ph:"/ˈkwɒn.dər.i/",pos:"n.",th:"สถานการณ์ที่ลำบาก",ex:"She was in a real quandary.",l:"C1",e:["TOEFL"]},
{w:"recalcitrant",ph:"/rɪˈkæl.sɪ.trənt/",pos:"adj.",th:"ดื้อดึง, ไม่ยอมตาม",ex:"The recalcitrant student refused to cooperate.",l:"C1",e:["TOEFL"]},
{w:"rectify",ph:"/ˈrek.tɪ.faɪ/",pos:"v.",th:"แก้ไข, ทำให้ถูกต้อง",ex:"We must rectify this error immediately.",l:"C1",e:["TOEFL","A-Level"]},
{w:"scrutinize",ph:"/ˈskruː.tɪ.naɪz/",pos:"v.",th:"ตรวจสอบอย่างละเอียด",ex:"The committee scrutinized every document.",l:"C1",e:["TOEFL","A-Level"]},
{w:"spurious",ph:"/ˈspjʊər.i.əs/",pos:"adj.",th:"ปลอม, ไม่แท้จริง",ex:"He made a spurious claim.",l:"C1",e:["TOEFL"]},
{w:"superfluous",ph:"/suːˈpɜː.flu.əs/",pos:"adj.",th:"เกินความจำเป็น",ex:"Remove all superfluous words.",l:"C1",e:["TOEFL"]},
{w:"tenacious",ph:"/təˈneɪ.ʃəs/",pos:"adj.",th:"อดทน, ยึดมั่น",ex:"She is tenacious in her goals.",l:"C1",e:["TOEFL"]},
{w:"ubiquitous",ph:"/juːˈbɪk.wɪ.təs/",pos:"adj.",th:"มีอยู่ทุกหนทุกแห่ง",ex:"Smartphones are now ubiquitous.",l:"C1",e:["TOEFL"]},
{w:"unanimously",ph:"/juːˈnæn.ɪ.məs.li/",pos:"adv.",th:"เป็นเอกฉันท์",ex:"They voted unanimously to approve.",l:"C1",e:["TOEFL","TGAT"]},
{w:"zealous",ph:"/ˈzel.əs/",pos:"adj.",th:"เต็มไปด้วยความมุ่งมั่น",ex:"He is zealous about his work.",l:"C1",e:["TOEFL","A-Level"]},
];

document.getElementById('word-count').textContent = V.length;

let level='all', mode='flash';
let pool=[], idx=0, known=new Set(), streak=0, flipped=false;
let qList=[], qIdx=0, qScore=0, qAns=false;
let mSelW=null, mSelD=null, mPairs=[], mDone=new Set();

function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getPool(){return sh(level==='all'?V:V.filter(v=>v.l===level));}
function upStats(){document.getElementById('s-total').textContent=pool.length;document.getElementById('s-known').textContent=known.size;document.getElementById('s-streak').textContent=streak;}
function ltagClass(l){return `ltag-${l.toLowerCase()}`;}

// FLASH
function loadCard(){
  if(!pool.length)return;
  let v=pool[idx%pool.length];
  document.getElementById('fw').textContent=v.w;
  document.getElementById('fph').textContent=v.ph;
  document.getElementById('fm').textContent=v.th;
  document.getElementById('fpos').textContent=v.pos;
  document.getElementById('fex').textContent='"'+v.ex+'"';
  ['fm','fpos','fex'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('fhint').style.display='block';
  let tags=v.e.map(e=>`<span class="tag etag">${e}</span>`).join('');
  tags+=`<span class="tag ${ltagClass(v.l)}">${v.l}</span>`;
  document.getElementById('ftags').innerHTML=tags;
  document.getElementById('fp').style.width=Math.round(idx/pool.length*100)+'%';
  flipped=false; upStats();
}
function flip(){
  flipped=!flipped;
  ['fm','fpos','fex'].forEach(id=>document.getElementById(id).style.display=flipped?'block':'none');
  document.getElementById('fhint').style.display=flipped?'none':'block';
}
function mark(ok){
  let v=pool[idx%pool.length];
  if(ok){known.add(v.w);streak++;}else{known.delete(v.w);streak=0;}
  nextCard();
}
function nextCard(){idx=(idx+1)%pool.length;loadCard();}

// QUIZ
function startQuiz(){
  pool=getPool();
  qList=pool.slice(0,Math.min(15,pool.length));
  qIdx=0;qScore=0;
  document.getElementById('qbody').style.display='block';
  document.getElementById('qres').style.display='none';
  loadQuiz();
}
function loadQuiz(){
  if(qIdx>=qList.length){showResult();return;}
  qAns=false;
  let v=qList[qIdx];
  document.getElementById('qw').textContent=v.w;
  document.getElementById('qph').textContent=v.ph;
  let tags=v.e.map(e=>`<span class="tag etag">${e}</span>`).join('')+`<span class="tag ${ltagClass(v.l)}">${v.l}</span>`;
  document.getElementById('qtags').innerHTML=tags;
  document.getElementById('qnx').style.display='none';
  document.getElementById('qp').style.width=Math.round(qIdx/qList.length*100)+'%';
  let wrongs=sh(V.filter(x=>x.w!==v.w)).slice(0,3).map(x=>x.th);
  let opts=sh([v.th,...wrongs]);
  let c=document.getElementById('qopts');c.innerHTML='';
  opts.forEach(o=>{
    let b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>checkOpt(b,o,v.th);c.appendChild(b);
  });
}
function checkOpt(btn,chosen,correct){
  if(qAns)return;qAns=true;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('ok');
    else if(b===btn)b.classList.add('ng');
  });
  if(chosen===correct){qScore++;streak++;}else{streak=0;}
  upStats();document.getElementById('qnx').style.display='block';
}
function nextQuiz(){qIdx++;loadQuiz();}
function showResult(){
  document.getElementById('qbody').style.display='none';
  document.getElementById('qres').style.display='block';
  document.getElementById('qp').style.width='100%';
  document.getElementById('rscore').textContent=qScore+'/'+qList.length;
  let p=Math.round(qScore/qList.length*100);
  document.getElementById('rsub').textContent=p>=80?'🎉 เก่งมากเลย!':p>=50?'💪 พยายามต่อไป':'📖 ลองทบทวนอีกครั้ง';
}

// MATCH
function startMatch(){
  mSelW=null;mSelD=null;mDone=new Set();
  let p=sh(getPool()).slice(0,6);
  mPairs=p.map(v=>({w:v.w,th:v.th}));
  let defs=sh(mPairs.map(x=>x.th));
  let wc=document.getElementById('mw'),dc=document.getElementById('md');
  wc.innerHTML='';dc.innerHTML='';
  mPairs.forEach(p=>{
    let b=document.createElement('button');b.className='mb';b.textContent=p.w;b.dataset.w=p.w;
    b.onclick=()=>selW(b);wc.appendChild(b);
  });
  defs.forEach(d=>{
    let b=document.createElement('button');b.className='mb';b.textContent=d;b.dataset.d=d;
    b.onclick=()=>selD(b);dc.appendChild(b);
  });
  document.getElementById('mmsg').textContent='';
}
function selW(btn){
  if(btn.classList.contains('matched'))return;
  document.querySelectorAll('#mw .mb').forEach(b=>b.classList.remove('sel'));
  mSelW=btn;btn.classList.add('sel');tryMatch();
}
function selD(btn){
  if(btn.classList.contains('matched'))return;
  document.querySelectorAll('#md .mb').forEach(b=>b.classList.remove('sel'));
  mSelD=btn;btn.classList.add('sel');tryMatch();
}
function tryMatch(){
  if(!mSelW||!mSelD)return;
  let w=mSelW.dataset.w,d=mSelD.dataset.d;
  let pair=mPairs.find(p=>p.w===w);
  if(pair&&pair.th===d){
    mSelW.classList.remove('sel');mSelD.classList.remove('sel');
    mSelW.classList.add('matched');mSelD.classList.add('matched');
    mSelW.disabled=true;mSelD.disabled=true;
    mDone.add(w);streak++;upStats();
    if(mDone.size===mPairs.length)document.getElementById('mmsg').textContent='🎉 ครบแล้ว! กด "ชุดใหม่" เพื่อเล่นต่อ';
  }else{
    mSelW.classList.add('err');mSelD.classList.add('err');
    streak=0;upStats();
    setTimeout(()=>{mSelW.classList.remove('sel','err');mSelD.classList.remove('sel','err');},500);
  }
  mSelW=null;mSelD=null;
}

// MODE / LEVEL
function switchMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['flash','quiz','match'][i]===m));
  document.getElementById('m-flash').classList.toggle('hidden',m!=='flash');
  document.getElementById('m-quiz').classList.toggle('hidden',m!=='quiz');
  document.getElementById('m-match').classList.toggle('hidden',m!=='match');
  if(m==='flash'){pool=getPool();idx=0;loadCard();}
  else if(m==='quiz')startQuiz();
  else startMatch();
}
function setLevel(l){
  level=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  known=new Set();streak=0;
  switchMode(mode);
}

pool=getPool();upStats();loadCard();
</script>
</body>
</html>
