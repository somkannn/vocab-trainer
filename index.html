<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VocabUp — ศัพท์สอบเข้ามหาวิทยาลัย</title>
<style>
:root{
  --bg:#fafaf8;--bg2:#f2f2ee;--bg3:#e8e8e2;
  --text:#111;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --green:#1a7a46;--gbg:#e6f4ed;--gborder:#b7dfc8;
  --red:#c0392b;--rbg:#fdecea;--rborder:#f5b7b1;
  --blue:#1a5fa8;--bbg:#e8f0fc;
  --orange:#d4500a;--obg:#fef0e6;
  --purple:#6b21a8;--pbg:#f3e8ff;
  --yellow:#b45309;--ybg:#fef9c3;
  --r:16px;--rs:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--bg2:#1c1c1c;--bg3:#272727;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --green:#4ade80;--gbg:#052e16;--gborder:#166534;
  --red:#f87171;--rbg:#2d0b0b;--rborder:#7f1d1d;
  --blue:#60a5fa;--bbg:#0c1e3d;
  --orange:#fb923c;--obg:#2d1500;
  --purple:#c084fc;--pbg:#1e0a3c;
  --yellow:#fbbf24;--ybg:#1c1700;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:600px;margin:0 auto;padding:1.5rem 1rem 6rem;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.logo{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.logo em{font-style:normal;color:var(--blue);}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--ybg);color:var(--yellow);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;border:1px solid rgba(180,83,9,.2);}

/* Mode Filter */
.mode-filter{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.siw-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap;}
.siw-btn.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.siw-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

/* Tabs */
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:1.25rem;}
.tab{padding:8px 4px;border:none;background:transparent;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-icon{font-size:16px;}
.tab.on{background:var(--bg);color:var(--text);box-shadow:var(--shadow);}

/* Level pills */
.lvls{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.lb{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-weight:500;transition:all .15s;}
.lb.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.lb-a1{} .lb-a2.on{background:var(--blue);border-color:var(--blue);}
.lb-b1.on{background:var(--orange);border-color:var(--orange);}
.lb-b2.on{background:var(--red);border-color:var(--red);}
.lb-c1.on{background:var(--purple);border-color:var(--purple);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.st{background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center;}
.st-n{font-size:22px;font-weight:700;}
.st-l{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}

/* Progress */
.pg{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:1.25rem;overflow:hidden;}
.pgb{height:3px;background:var(--text);border-radius:2px;transition:width .4s;}

/* ── SWIPE CARD ── */
.card-scene{position:relative;height:260px;margin-bottom:.5rem;}
.swipe-labels{display:flex;justify-content:space-between;font-size:11px;font-weight:600;padding:0 4px;margin-bottom:.5rem;color:var(--text3);}
.swipe-labels span:first-child{color:var(--red);}
.swipe-labels span:last-child{color:var(--green);}

.card{position:absolute;inset:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;text-align:center;cursor:grab;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow);will-change:transform;}
.card:active{cursor:grabbing;}
.card.fly{transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;pointer-events:none;}

.sh{position:absolute;font-size:22px;font-weight:800;opacity:0;padding:6px 14px;border-radius:10px;pointer-events:none;top:16px;transition:opacity .08s;}
.sh-l{left:14px;color:var(--red);background:var(--rbg);}
.sh-r{right:14px;color:var(--green);background:var(--gbg);}

.cw{font-size:34px;font-weight:700;letter-spacing:-1px;line-height:1.1;}
.cph{font-size:13px;color:var(--text2);margin-top:5px;font-style:italic;}
.ctags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
.tag{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600;}
.tg-a1{background:#f0fdf4;color:#15803d;}  .tg-a2{background:#eff6ff;color:#1d4ed8;}
.tg-b1{background:#fff7ed;color:#c2410c;}  .tg-b2{background:#fff1f2;color:#be123c;}
.tg-c1{background:#faf5ff;color:#7e22ce;}
@media(prefers-color-scheme:dark){
  .tg-a1{background:#052e16;color:#4ade80;}.tg-a2{background:#0c1e3d;color:#60a5fa;}
  .tg-b1{background:#2d1500;color:#fb923c;}.tg-b2{background:#2d0b0b;color:#f87171;}
  .tg-c1{background:#1e0a3c;color:#c084fc;}
}
.cm{font-size:16px;font-weight:600;margin-top:14px;display:none;line-height:1.3;}
.cpos{font-size:11px;color:var(--text3);margin-top:3px;display:none;}
.cex{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6;font-style:italic;display:none;}
.chint{font-size:11px;color:var(--text3);margin-top:14px;}

.cbtns{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:1.5rem;}
.cb{padding:10px 14px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;font-size:13px;cursor:pointer;color:var(--text);transition:all .12s;font-weight:500;}
.cb:hover{background:var(--bg2);}
.cb-no{border-color:var(--rborder);color:var(--red);}  .cb-no:hover{background:var(--rbg);}
.cb-yes{border-color:var(--gborder);color:var(--green);}  .cb-yes:hover{background:var(--gbg);}
.cb-sk{color:var(--text2);font-size:18px;}

/* ── QUIZ ── */
.qcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;text-align:center;margin-bottom:1rem;box-shadow:var(--shadow);}
.qw{font-size:30px;font-weight:700;letter-spacing:-.8px;}
.qph{font-size:13px;color:var(--text2);margin-top:4px;font-style:italic;}
.qtags{display:flex;gap:4px;justify-content:center;margin-top:10px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem;}
.opt{padding:14px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text);text-align:left;line-height:1.4;transition:all .12s;font-weight:500;}
.opt:hover:not(:disabled){border-color:var(--border2);background:var(--bg2);}
.opt.ok{background:var(--gbg);border-color:var(--gborder);color:var(--green);}
.opt.ng{background:var(--rbg);border-color:var(--rborder);color:var(--red);}
.opt:disabled{cursor:default;}
.nxrow{display:none;margin-top:.25rem;}

/* ── SPEED MODE ── */
.speed-bar-wrap{height:6px;background:var(--bg3);border-radius:3px;margin-bottom:1.25rem;overflow:hidden;}
.speed-bar{height:6px;border-radius:3px;background:var(--green);transition:width .1s linear;}
.speed-bar.warn{background:var(--orange);}
.speed-bar.danger{background:var(--red);}
.speed-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.speed-timer{font-size:28px;font-weight:700;letter-spacing:-.5px;}
.speed-combo{font-size:13px;font-weight:600;color:var(--orange);background:var(--obg);padding:4px 12px;border-radius:20px;}

/* ── MATCH ── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem;}
.mcol{display:flex;flex-direction:column;gap:7px;}
.mb{padding:11px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text);text-align:left;line-height:1.4;transition:all .12s;min-height:46px;font-weight:500;}
.mb:hover{border-color:var(--border2);}
.mb.sel{border-color:var(--text);background:var(--bg2);}
.mb.matched{background:var(--gbg);border-color:var(--gborder);color:var(--green);cursor:default;}
.mb.err{background:var(--rbg);border-color:var(--rborder);}
.mmsg{text-align:center;font-size:13px;color:var(--text2);margin-bottom:.75rem;min-height:20px;font-weight:500;}

/* ── RESULT ── */
.res{display:none;text-align:center;padding:2.5rem 1rem;}
.rs{font-size:56px;font-weight:800;letter-spacing:-2px;}
.rl{font-size:14px;color:var(--text2);margin-top:4px;margin-bottom:1.5rem;}
.rbtns{display:flex;gap:8px;max-width:320px;margin:0 auto;}

/* ── PROGRESS VIEW ── */
.progress-view{display:none;}
.prog-level{background:var(--bg2);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:.75rem;border:1px solid var(--border);}
.prog-level-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
.prog-level-name{font-weight:700;font-size:14px;}
.prog-level-pct{font-size:13px;color:var(--text2);}
.prog-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-fill{height:6px;border-radius:3px;transition:width .6s;}

/* Shared buttons */
.btnp{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btnp:hover{opacity:.8;}
.btno{width:100%;padding:11px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-weight:500;}
.btno:hover{background:var(--bg2);}
.hidden{display:none!important;}
@media(max-width:480px){
  .opts{grid-template-columns:1fr;} .cw{font-size:28px;} .qw{font-size:24px;} .rs{font-size:44px;}
  .card-scene{height:250px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">Vocab<em>Up</em></div>
    <div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">0</span> วัน</div>
  </div>

  <!-- ซิ่วโหมด -->
  <div class="mode-filter">
    <button class="siw-btn" id="siw-btn" onclick="toggleSiw()">
      <span class="siw-dot"></span>ซิ่วโหมด (B1–C1)
    </button>
    <span style="font-size:11px;color:var(--text3)">เน้นศัพท์ออกสอบจริง</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" onclick="switchMode('flash')" id="tab-flash">
      <span class="tab-icon">🃏</span><span>Swipe</span>
    </button>
    <button class="tab" onclick="switchMode('quiz')" id="tab-quiz">
      <span class="tab-icon">🧠</span><span>Quiz</span>
    </button>
    <button class="tab" onclick="switchMode('speed')" id="tab-speed">
      <span class="tab-icon">⚡</span><span>Speed</span>
    </button>
    <button class="tab" onclick="switchMode('match')" id="tab-match">
      <span class="tab-icon">🔗</span><span>จับคู่</span>
    </button>
  </div>

  <!-- Level filter -->
  <div class="lvls" id="lvl-row">
    <button class="lb on" onclick="setLevel('all')">ทั้งหมด</button>
    <button class="lb lb-a1" onclick="setLevel('A1')">A1</button>
    <button class="lb lb-a2" onclick="setLevel('A2')">A2</button>
    <button class="lb lb-b1" onclick="setLevel('B1')">B1</button>
    <button class="lb lb-b2" onclick="setLevel('B2')">B2</button>
    <button class="lb lb-c1" onclick="setLevel('C1')">C1</button>
    <button class="lb" onclick="switchMode('prog')" style="margin-left:auto">📊 Progress</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="st"><div class="st-n" id="s-tot">0</div><div class="st-l">คำในชุด</div></div>
    <div class="st"><div class="st-n" id="s-kn">0</div><div class="st-l">รู้แล้ว ✓</div></div>
    <div class="st"><div class="st-n" id="s-st">0</div><div class="st-l">combo 🔥</div></div>
  </div>

  <!-- ══ SWIPE MODE ══ -->
  <div id="m-flash">
    <div class="pg"><div class="pgb" id="fp" style="width:0%"></div></div>
    <div class="swipe-labels"><span>✕ ยังไม่รู้</span><span>แตะ = เปิด</span><span>รู้แล้ว ✓</span></div>
    <div class="card-scene">
      <div class="card" id="fc">
        <div class="sh sh-l" id="sh-l">✕</div>
        <div class="sh sh-r" id="sh-r">✓</div>
        <div class="cw" id="fw">—</div>
        <div class="cph" id="fph"></div>
        <div class="ctags" id="ftags"></div>
        <div class="cm" id="fm"></div>
        <div class="cpos" id="fpos"></div>
        <div class="cex" id="fex"></div>
        <div class="chint" id="fhint">แตะเพื่อดูความหมาย</div>
      </div>
    </div>
    <div class="cbtns">
      <button class="cb cb-no" onclick="mark(false)">✕ ไม่รู้</button>
      <button class="cb cb-sk" onclick="nextCard()">↓</button>
      <button class="cb cb-yes" onclick="mark(true)">รู้ ✓</button>
    </div>
  </div>

  <!-- ══ QUIZ MODE ══ -->
  <div id="m-quiz" class="hidden">
    <div class="pg"><div class="pgb" id="qp" style="width:0%"></div></div>
    <div id="qbody">
      <div class="qcard">
        <div class="qw" id="qw">—</div>
        <div class="qph" id="qph"></div>
        <div class="qtags" id="qtags"></div>
      </div>
      <div class="opts" id="qopts"></div>
      <div class="nxrow" id="qnx"><button class="btnp" onclick="nextQuiz()">ถัดไป →</button></div>
    </div>
    <div class="res" id="qres">
      <div class="rs" id="rscore">0/0</div>
      <div class="rl" id="rsub"></div>
      <div class="rbtns">
        <button class="btnp" onclick="startQuiz()">เล่นใหม่</button>
        <button class="btno" onclick="switchMode('flash')">Swipe</button>
      </div>
    </div>
  </div>

  <!-- ══ SPEED MODE ══ -->
  <div id="m-speed" class="hidden">
    <div id="speed-play">
      <div class="speed-stat">
        <div class="speed-timer" id="sp-timer">60</div>
        <div class="speed-combo" id="sp-combo">0 ถูก</div>
      </div>
      <div class="speed-bar-wrap"><div class="speed-bar" id="sp-bar" style="width:100%"></div></div>
      <div class="qcard">
        <div class="qw" id="sp-word">—</div>
        <div class="qph" id="sp-ph"></div>
        <div class="qtags" id="sp-tags"></div>
      </div>
      <div class="opts" id="sp-opts"></div>
    </div>
    <div class="res" id="sp-res">
      <div class="rs" id="sp-score">0</div>
      <div class="rl" id="sp-sub"></div>
      <div class="rbtns">
        <button class="btnp" onclick="startSpeed()">เล่นใหม่</button>
        <button class="btno" onclick="switchMode('quiz')">Quiz</button>
      </div>
    </div>
    <div id="speed-start" style="text-align:center;padding:2rem 0">
      <div style="font-size:48px;margin-bottom:1rem">⚡</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:.5rem">Speed Mode</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:1.5rem">60 วินาที ตอบให้ได้มากที่สุด!</div>
      <button class="btnp" style="max-width:200px;margin:0 auto" onclick="startSpeed()">เริ่มเลย!</button>
    </div>
  </div>

  <!-- ══ MATCH MODE ══ -->
  <div id="m-match" class="hidden">
    <div class="mgrid">
      <div class="mcol" id="mw"></div>
      <div class="mcol" id="md"></div>
    </div>
    <div class="mmsg" id="mmsg"></div>
    <button class="btno" onclick="startMatch()">🔀 ชุดใหม่</button>
  </div>

  <!-- ══ PROGRESS VIEW ══ -->
  <div id="m-prog" class="progress-view hidden">
    <div style="font-size:16px;font-weight:700;margin-bottom:1rem">📊 ความคืบหน้า</div>
    <div id="prog-cards"></div>
    <button class="btno" style="margin-top:.5rem" onclick="switchMode('flash')">← กลับ</button>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────
document.getElementById('s-tot').closest('.stats').previousElementSibling; // noop
const LEVELS = ['A1','A2','B1','B2','C1'];
const LEVEL_COLORS = {A1:'#15803d',A2:'#1d4ed8',B1:'#c2410c',B2:'#be123c',C1:'#7e22ce'};
let level = 'all', mode = 'flash', siwMode = false;
let pool = [], idx = 0, known = new Set(), combo = 0, flipped = false;
let qList = [], qIdx = 0, qScore = 0, qAns = false;
let spTimer = null, spLeft = 60, spScore = 0, spCombo = 0, spAns = false;
let mSelW = null, mSelD = null, mPairs = [], mDone = new Set();
let dailyStreak = parseInt(localStorage.getItem('streak') || '0');
let lastDate = localStorage.getItem('lastDate') || '';

// Streak
const today = new Date().toDateString();
if (lastDate !== today) {
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if (lastDate !== yesterday) dailyStreak = 0;
}
document.getElementById('streak-num').textContent = dailyStreak;

function saveStreak() {
  if (lastDate !== today) {
    dailyStreak++; lastDate = today;
    localStorage.setItem('streak', dailyStreak);
    localStorage.setItem('lastDate', today);
    document.getElementById('streak-num').textContent = dailyStreak;
  }
}

// ── HELPERS ───────────────────────────────────────────
const sh = a => {
  let b=[...a]; for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b;
};
function getPool() {
  let base = siwMode
    ? VOCAB.filter(v => ['A2','B1','B2','C1'].includes(v[5]))
    : (level === 'all' ? VOCAB : VOCAB.filter(v => v[5] === level));
  if (!siwMode && level !== 'all') base = VOCAB.filter(v => v[5] === level);
  return sh(base);
}
const ltag = l => `tg-${l.toLowerCase()}`;
const upStats = () => {
  document.getElementById('s-tot').textContent = pool.length;
  document.getElementById('s-kn').textContent = known.size;
  document.getElementById('s-st').textContent = combo;
};
function tagHtml(v) {
  return `<span class="tag ${ltag(v[5])}">${v[5]}</span>`;
}

// ── SWIPE ─────────────────────────────────────────────
const card = document.getElementById('fc');
const shL = document.getElementById('sh-l'), shR = document.getElementById('sh-r');
let tx0=0, ty0=0, dragging=false, startT=0, dx=0, moved=false;
const THRESH = 70;

const cardStart = (x,y) => { tx0=x; ty0=y; dragging=true; startT=Date.now(); dx=0; moved=false; card.style.transition='none'; };
const cardMove = (x,y) => {
  if (!dragging) return;
  dx = x-tx0; let dy = y-ty0;
  if (!moved && Math.abs(dy) > Math.abs(dx)+4) { dragging=false; cardReset(); return; }
  if (Math.abs(dx) > 5) moved = true;
  card.style.transform = `translateX(${dx}px) rotate(${dx*0.06}deg)`;
  let r = Math.min(Math.abs(dx)/THRESH, 1);
  shL.style.opacity = dx < 0 ? r : 0;
  shR.style.opacity = dx > 0 ? r : 0;
};
const cardEnd = () => {
  if (!dragging) return; dragging = false;
  let vel = Math.abs(dx) / (Date.now()-startT);
  if (Math.abs(dx) > THRESH || vel > 0.45) {
    let ok = dx > 0;
    card.classList.add('fly');
    card.style.transform = `translateX(${ok?700:-700}px) rotate(${ok?22:-22}deg)`;
    card.style.opacity = '0';
    setTimeout(() => { mark(ok); card.classList.remove('fly'); cardReset(); }, 330);
  } else {
    cardReset();
    if (!moved) flip(); // tap = flip
  }
};
const cardReset = () => {
  card.style.transition=''; card.style.transform=''; card.style.opacity='';
  shL.style.opacity=0; shR.style.opacity=0; dx=0; moved=false;
};

card.addEventListener('touchstart', e => { let t=e.touches[0]; cardStart(t.clientX,t.clientY); }, {passive:true});
card.addEventListener('touchmove',  e => { let t=e.touches[0]; cardMove(t.clientX,t.clientY); }, {passive:true});
card.addEventListener('touchend', cardEnd);
card.addEventListener('mousedown', e => { cardStart(e.clientX,e.clientY); e.preventDefault(); });
window.addEventListener('mousemove', e => { if(dragging) cardMove(e.clientX,e.clientY); });
window.addEventListener('mouseup', cardEnd);

// ── FLASHCARD ─────────────────────────────────────────
function loadCard() {
  if (!pool.length) return;
  let v = pool[idx % pool.length];
  document.getElementById('fw').textContent = v[0];
  document.getElementById('fph').textContent = v[1];
  document.getElementById('fm').textContent = v[3];
  document.getElementById('fpos').textContent = v[2];
  document.getElementById('fex').textContent = '"' + v[4] + '"';
  ['fm','fpos','fex'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('fhint').style.display = 'block';
  document.getElementById('ftags').innerHTML = tagHtml(v);
  document.getElementById('fp').style.width = Math.round(idx/pool.length*100)+'%';
  flipped = false; upStats();
}
function flip() {
  flipped = !flipped;
  ['fm','fpos','fex'].forEach(id => document.getElementById(id).style.display = flipped?'block':'none');
  document.getElementById('fhint').style.display = flipped?'none':'block';
}
function mark(ok) {
  let v = pool[idx%pool.length];
  if (ok) { known.add(v[0]); combo++; saveStreak(); } else { known.delete(v[0]); combo=0; }
  cardReset(); nextCard();
}
function nextCard() { idx = (idx+1)%pool.length; loadCard(); }

// ── QUIZ ──────────────────────────────────────────────
function startQuiz() {
  pool = getPool(); qList = pool.slice(0,Math.min(15,pool.length)); qIdx=0; qScore=0;
  document.getElementById('qbody').style.display = 'block';
  document.getElementById('qres').style.display = 'none';
  loadQuiz();
}
function loadQuiz() {
  if (qIdx >= qList.length) { showQResult(); return; }
  qAns = false; let v = qList[qIdx];
  document.getElementById('qw').textContent = v[0];
  document.getElementById('qph').textContent = v[1];
  document.getElementById('qtags').innerHTML = tagHtml(v);
  document.getElementById('qnx').style.display = 'none';
  document.getElementById('qp').style.width = Math.round(qIdx/qList.length*100)+'%';
  let wrongs = sh(VOCAB.filter(x=>x[0]!==v[0])).slice(0,3).map(x=>x[3]);
  let opts = sh([v[3],...wrongs]);
  let c = document.getElementById('qopts'); c.innerHTML='';
  opts.forEach(o => {
    let b = document.createElement('button'); b.className='opt'; b.textContent=o;
    b.onclick = () => checkQ(b,o,v[3]); c.appendChild(b);
  });
}
function checkQ(btn,chosen,correct) {
  if (qAns) return; qAns=true;
  document.querySelectorAll('.opt').forEach(b => {
    b.disabled=true;
    if (b.textContent===correct) b.classList.add('ok');
    else if (b===btn) b.classList.add('ng');
  });
  if (chosen===correct) { qScore++; combo++; saveStreak(); } else combo=0;
  upStats(); document.getElementById('qnx').style.display='block';
}
function nextQuiz() { qIdx++; loadQuiz(); }
function showQResult() {
  document.getElementById('qbody').style.display='none';
  document.getElementById('qres').style.display='block';
  document.getElementById('qp').style.width='100%';
  document.getElementById('rscore').textContent = qScore+'/'+qList.length;
  let p = Math.round(qScore/qList.length*100);
  document.getElementById('rsub').textContent = p>=80?'🎉 เก่งมากเลย! ไปสอบได้เลย':p>=50?'💪 ใกล้แล้ว พยายามต่อ':'📖 ทบทวนอีกรอบนะ';
}

// ── SPEED MODE ────────────────────────────────────────
let speedPool = [];
function startSpeed() {
  clearInterval(spTimer); spLeft=60; spScore=0; spCombo=0; spAns=false;
  speedPool = sh(getPool());
  document.getElementById('speed-start').style.display='none';
  document.getElementById('sp-res').style.display='none';
  document.getElementById('speed-play').style.display='block';
  loadSpeedQ();
  spTimer = setInterval(tickSpeed, 100);
}
function tickSpeed() {
  spLeft -= 0.1;
  let pct = Math.max(0,(spLeft/60)*100);
  let bar = document.getElementById('sp-bar');
  bar.style.width = pct+'%';
  bar.className = 'speed-bar' + (spLeft<15?' danger':spLeft<30?' warn':'');
  document.getElementById('sp-timer').textContent = Math.ceil(spLeft);
  if (spLeft <= 0) endSpeed();
}
function endSpeed() {
  clearInterval(spTimer);
  document.getElementById('speed-play').style.display='none';
  document.getElementById('sp-res').style.display='block';
  document.getElementById('sp-score').textContent = spScore;
  let msg = spScore>=20?'🔥 เทพมาก!':spScore>=12?'⚡ เก่งมาก!':spScore>=6?'👍 ดี!':'📖 ฝึกอีกนะ';
  document.getElementById('sp-sub').textContent = msg + ` ตอบถูก ${spScore} ข้อ`;
}
function loadSpeedQ() {
  if (!speedPool.length) speedPool = sh(getPool());
  let v = speedPool.pop();
  spAns = false;
  document.getElementById('sp-word').textContent = v[0];
  document.getElementById('sp-ph').textContent = v[1];
  document.getElementById('sp-tags').innerHTML = tagHtml(v);
  document.getElementById('sp-combo').textContent = spScore+' ถูก'+(spCombo>=3?' 🔥'.repeat(Math.min(spCombo,5)):'');
  let wrongs = sh(VOCAB.filter(x=>x[0]!==v[0])).slice(0,3).map(x=>x[3]);
  let opts = sh([v[3],...wrongs]);
  let c = document.getElementById('sp-opts'); c.innerHTML='';
  opts.forEach(o => {
    let b = document.createElement('button'); b.className='opt'; b.textContent=o;
    b.onclick = () => checkSpeed(b,o,v[3]); c.appendChild(b);
  });
}
function checkSpeed(btn,chosen,correct) {
  if (spAns||spLeft<=0) return; spAns=true;
  document.querySelectorAll('#sp-opts .opt').forEach(b => {
    b.disabled=true;
    if (b.textContent===correct) b.classList.add('ok');
    else if (b===btn) { b.classList.add('ng'); spCombo=0; }
  });
  if (chosen===correct) { spScore++; spCombo++; saveStreak(); } else spCombo=0;
  combo = spCombo; upStats();
  setTimeout(loadSpeedQ, chosen===correct?300:600);
}

// ── MATCH MODE ────────────────────────────────────────
function startMatch() {
  mSelW=null; mSelD=null; mDone=new Set();
  let p=sh(getPool()).slice(0,6); mPairs=p.map(v=>({w:v[0],th:v[3]}));
  let defs=sh(mPairs.map(x=>x.th));
  let wc=document.getElementById('mw'), dc=document.getElementById('md');
  wc.innerHTML=''; dc.innerHTML='';
  mPairs.forEach(p=>{
    let b=document.createElement('button'); b.className='mb'; b.textContent=p.w; b.dataset.w=p.w;
    b.onclick=()=>selW(b); wc.appendChild(b);
  });
  defs.forEach(d=>{
    let b=document.createElement('button'); b.className='mb'; b.textContent=d; b.dataset.d=d;
    b.onclick=()=>selD(b); dc.appendChild(b);
  });
  document.getElementById('mmsg').textContent='';
}
function selW(btn){if(btn.classList.contains('matched'))return;document.querySelectorAll('#mw .mb').forEach(b=>b.classList.remove('sel'));mSelW=btn;btn.classList.add('sel');tryMatch();}
function selD(btn){if(btn.classList.contains('matched'))return;document.querySelectorAll('#md .mb').forEach(b=>b.classList.remove('sel'));mSelD=btn;btn.classList.add('sel');tryMatch();}
function tryMatch() {
  if (!mSelW||!mSelD) return;
  let pair = mPairs.find(p=>p.w===mSelW.dataset.w);
  if (pair && pair.th===mSelD.dataset.d) {
    mSelW.classList.remove('sel'); mSelD.classList.remove('sel');
    mSelW.classList.add('matched'); mSelD.classList.add('matched');
    mSelW.disabled=true; mSelD.disabled=true;
    mDone.add(mSelW.dataset.w); combo++; saveStreak(); upStats();
    if (mDone.size===mPairs.length) document.getElementById('mmsg').textContent='🎉 ครบแล้ว! กด "ชุดใหม่" ต่อเลย';
  } else {
    mSelW.classList.add('err'); mSelD.classList.add('err'); combo=0; upStats();
    setTimeout(()=>{mSelW.classList.remove('sel','err');mSelD.classList.remove('sel','err');},500);
  }
  mSelW=null; mSelD=null;
}

// ── PROGRESS VIEW ─────────────────────────────────────
function renderProgress() {
  let html = '';
  const colors = {A1:'#15803d',A2:'#1d4ed8',B1:'#c2410c',B2:'#be123c',C1:'#7e22ce'};
  LEVELS.forEach(l => {
    let total = VOCAB.filter(v=>v[5]===l).length;
    let done = [...known].filter(w=>{let v=VOCAB.find(x=>x[0]===w);return v&&v[5]===l;}).length;
    let pct = total ? Math.round(done/total*100) : 0;
    html += `<div class="prog-level">
      <div class="prog-level-hdr">
        <span class="prog-level-name">${l}</span>
        <span class="prog-level-pct">${done}/${total} คำ (${pct}%)</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${colors[l]}"></div></div>
    </div>`;
  });
  document.getElementById('prog-cards').innerHTML = html;
}

// ── ซิ่วโหมด ──────────────────────────────────────────
function toggleSiw() {
  siwMode = !siwMode;
  document.getElementById('siw-btn').classList.toggle('on', siwMode);
  document.getElementById('lvl-row').style.opacity = siwMode ? '0.4' : '1';
  document.getElementById('lvl-row').style.pointerEvents = siwMode ? 'none' : '';
  pool = getPool(); idx=0; known=new Set(); combo=0;
  loadCard(); upStats();
}

// ── MODE SWITCH ───────────────────────────────────────
function switchMode(m) {
  clearInterval(spTimer);
  mode = m;
  ['flash','quiz','speed','match','prog'].forEach(x =>
    document.getElementById('m-'+x).classList.toggle('hidden', x!==m)
  );
  ['flash','quiz','speed','match'].forEach((x,i) =>
    document.getElementById('tab-'+x)?.classList.toggle('on', x===m)
  );
  if (m==='flash') { pool=getPool(); idx=0; loadCard(); }
  else if (m==='quiz') startQuiz();
  else if (m==='speed') {
    document.getElementById('speed-start').style.display='block';
    document.getElementById('sp-res').style.display='none';
    document.getElementById('speed-play').style.display='none';
  }
  else if (m==='match') startMatch();
  else if (m==='prog') renderProgress();
}
function setLevel(l) {
  level=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  known=new Set(); combo=0; switchMode(mode);
}

// ── INIT ──────────────────────────────────────────────
pool = getPool(); upStats(); loadCard();
</script>
</body>
</html>
